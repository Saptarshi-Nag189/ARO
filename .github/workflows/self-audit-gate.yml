name: Self-Audit Gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  self_audit_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Strict Self-Audit Gate (3 consecutive passes required)
        run: |
          python scripts/ci_self_audit_gate.py --runs 3 --audit-script verify_reasoning_mode.py

      - name: Upload Self-Audit Gate Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-audit-gate-logs
          path: logs/ci_self_audit
